name: demo-lite-verify

on:
  pull_request:
    paths:
      - "demo-lite/**"
      - ".github/workflows/demo-lite-verify.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "demo-lite/**"
      - ".github/workflows/demo-lite-verify.yml"
  workflow_dispatch:
    inputs:
      public_base_url:
        description: "Optional public demo-lite URL for manual smoke"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: demo-lite-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  demo-lite-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demo-lite

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: demo-lite/.node-version
          cache: npm
          cache-dependency-path: demo-lite/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run demo-lite tests
        run: npm test

      - name: Build demo-lite
        run: npm run build

      - name: Verify Pages baseline
        run: npm run verify:pages

  demo-lite-public-smoke:
    runs-on: ubuntu-latest
    needs: demo-lite-build
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.public_base_url != '' }}
    defaults:
      run:
        working-directory: demo-lite

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: demo-lite/.node-version
          cache: npm
          cache-dependency-path: demo-lite/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run public smoke against the provided URL
        run: npm run smoke:public -- "${{ github.event.inputs.public_base_url }}"
