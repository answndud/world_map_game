spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.session.SessionAutoConfiguration
  thymeleaf:
    cache: false
  docker:
    compose:
      lifecycle-management: start_only
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  sql:
    init:
      mode: never

worldmap:
  legacy:
    rollback:
      enabled: true
  admin:
    bootstrap:
      enabled: ${WORLDMAP_ADMIN_BOOTSTRAP_ENABLED:true}
      nickname: ${WORLDMAP_ADMIN_BOOTSTRAP_NICKNAME:worldmap_admin}
      password: ${WORLDMAP_ADMIN_BOOTSTRAP_PASSWORD:secret123}
  demo:
    bootstrap:
      enabled: ${WORLDMAP_DEMO_BOOTSTRAP_ENABLED:true}
      member-nickname: ${WORLDMAP_DEMO_MEMBER_NICKNAME:orbit_runner}
      member-password: ${WORLDMAP_DEMO_MEMBER_PASSWORD:secret123}
