spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.session.SessionAutoConfiguration
  docker:
    compose:
      enabled: false
  datasource:
    url: jdbc:h2:mem:worldmap;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  data:
    redis:
      host: localhost
      port: 6379
      repositories:
        enabled: false

worldmap:
  legacy:
    rollback:
      enabled: true
  admin:
    bootstrap:
      enabled: false
  demo:
    bootstrap:
      enabled: false
  ranking:
    key-prefix: test:leaderboard
