spring:
  thymeleaf:
    cache: true
  docker:
    compose:
      enabled: false
  lifecycle:
    timeout-per-shutdown-phase: 20s
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  sql:
    init:
      mode: never
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      ssl:
        enabled: ${SPRING_DATA_REDIS_SSL_ENABLED:false}

server:
  forward-headers-strategy: native
  shutdown: graceful
  servlet:
    session:
      timeout: 14d
      cookie:
        name: WMSESSION
        http-only: true
        same-site: lax
        secure: true

management:
  endpoint:
    health:
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState,ping
        readiness:
          include: readinessState,db,redis,ping
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

worldmap:
  legacy:
    rollback:
      enabled: false
  admin:
    bootstrap:
      enabled: ${WORLDMAP_ADMIN_BOOTSTRAP_ENABLED:false}
      nickname: ${WORLDMAP_ADMIN_BOOTSTRAP_NICKNAME:}
      password: ${WORLDMAP_ADMIN_BOOTSTRAP_PASSWORD:}
  demo:
    bootstrap:
      enabled: false
  ranking:
    key-prefix: ${WORLDMAP_RANKING_KEY_PREFIX:leaderboard}
