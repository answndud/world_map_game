<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<script>
    (function () {
        try {
            var storedTheme = window.localStorage.getItem("worldmap-theme");
            document.documentElement.dataset.theme = storedTheme === "dark" ? "dark" : "light";
        } catch (error) {
            document.documentElement.dataset.theme = "light";
        }
    }());
</script>
<th:block th:fragment="siteHeader(activeSection)">
    <header class="site-header">
        <a class="site-brand" th:href="@{/}">
            <span class="site-brand-mark">WorldMap</span>
            <strong>Command</strong>
        </a>
        <div class="site-header__actions">
            <nav class="site-nav" aria-label="메인 이동">
                <a class="site-nav-link"
                   th:classappend="${activeSection == 'home'} ? ' is-active'"
                   th:href="@{/}">홈</a>
                <a class="site-nav-link"
                   th:classappend="${activeSection == 'stats'} ? ' is-active'"
                   th:href="@{/stats}">서비스 현황</a>
                <a class="site-nav-link"
                   th:classappend="${activeSection == 'ranking'} ? ' is-active'"
                   th:href="@{/ranking}">랭킹</a>
                <a class="site-nav-link"
                   th:if="${showDashboardLink}"
                   th:classappend="${activeSection == 'dashboard'} ? ' is-active'"
                   th:href="@{/dashboard}">관리</a>
                <a class="site-nav-link"
                   th:classappend="${activeSection == 'mypage'} ? ' is-active'"
                   th:href="@{/mypage}">내 기록</a>
            </nav>
            <button class="theme-toggle"
                    type="button"
                    data-theme-toggle
                    aria-pressed="false"
                    aria-label="테마 전환">
                <span class="theme-toggle__hint">테마</span>
                <strong class="theme-toggle__state" data-theme-toggle-label>라이트</strong>
            </button>
        </div>
    </header>
    <script th:src="@{/js/theme-toggle.js(v='20260406-public-copy-pass-2')}"></script>
</th:block>
</body>
</html>
