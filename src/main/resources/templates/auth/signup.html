<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" th:href="@{/css/site.css(v='20260330-a11y-keyboard-2')}">
</head>
<body>
<div class="page-shell">
    <th:block th:replace="~{fragments/site-header :: siteHeader('mypage')}"></th:block>
    <header class="hero compact-hero">
        <h1>회원가입</h1>
        <p class="hero-copy">기록을 저장할 계정을 만듭니다.</p>
    </header>

    <main class="layout">
        <section class="panel game-panel">
            <div class="panel-head">
                <h2>새 계정 만들기</h2>
            </div>

            <form class="game-form" th:action="@{/signup}" th:object="${signupForm}" method="post">
                <label class="field">
                    <span>닉네임</span>
                    <input type="text" th:field="*{nickname}" maxlength="20" placeholder="예: orbit_runner">
                </label>
                <label class="field">
                    <span>비밀번호</span>
                    <input type="password" th:field="*{password}" maxlength="100" placeholder="4자 이상 입력">
                </label>
                <p class="message-box" data-tone="error" th:if="${#fields.hasErrors('*')}" th:text="${#fields.errors('*')[0]}"></p>
                <p class="message-box" data-tone="error" th:if="${authErrorMessage}" th:text="${authErrorMessage}"></p>
                <div class="page-actions">
                    <button class="primary-button" type="submit">회원가입</button>
                    <a class="secondary-button" th:href="@{/login}">이미 계정이 있어요</a>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
