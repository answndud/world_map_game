<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" th:href="@{/css/site.css(v='20260325-light-depth-10')}">
</head>
<body>
<div class="page-shell">
    <th:block th:replace="~{fragments/site-header :: siteHeader('mypage')}"></th:block>
    <header class="hero compact-hero">
        <p class="eyebrow">Simple Account</p>
        <h1>회원가입</h1>
        <p class="hero-copy">
            WorldMap 계정은 닉네임과 비밀번호만 사용합니다.
            커뮤니티 기능 없이 점수와 랭킹 기록을 계속 남기기 위한 최소 계정입니다.
            이 브라우저에서 방금 만든 비회원 기록도 로그인과 함께 현재 계정으로 이어집니다.
        </p>
    </header>

    <main class="layout">
        <section class="panel game-panel">
            <div class="panel-head">
                <h2>새 계정 만들기</h2>
                <p>회원가입 후에는 새 게임 기록뿐 아니라, 현재 브라우저의 비회원 기록도 계정 소유로 전환됩니다.</p>
            </div>

            <form class="game-form" th:action="@{/signup}" th:object="${signupForm}" method="post">
                <label class="field">
                    <span>닉네임</span>
                    <input type="text" th:field="*{nickname}" maxlength="20" placeholder="예: orbit_runner">
                </label>
                <label class="field">
                    <span>비밀번호</span>
                    <input type="password" th:field="*{password}" maxlength="100" placeholder="4자 이상 입력">
                </label>
                <p class="message-box" data-tone="error" th:if="${#fields.hasErrors('*')}" th:text="${#fields.errors('*')[0]}"></p>
                <p class="message-box" data-tone="error" th:if="${authErrorMessage}" th:text="${authErrorMessage}"></p>
                <div class="page-actions">
                    <button class="primary-button" type="submit">회원가입</button>
                    <a class="secondary-button" th:href="@{/login}">이미 계정이 있어요</a>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
