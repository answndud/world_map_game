<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <link rel="stylesheet" th:href="@{/css/site.css(v='20260330-a11y-keyboard-2')}">
</head>
<body>
<div class="page-shell">
    <th:block th:replace="~{fragments/site-header :: siteHeader('mypage')}"></th:block>
    <header class="hero compact-hero">
        <h1>로그인</h1>
        <p class="hero-copy">기록을 저장하려면 로그인하세요.</p>
    </header>

    <main class="layout">
        <section class="panel game-panel">
            <div class="panel-head">
                <h2>계정 연결</h2>
            </div>

            <form class="game-form" th:action="@{/login(returnTo=${returnTo})}" th:object="${loginForm}" method="post">
                <label class="field">
                    <span>닉네임</span>
                    <input type="text" th:field="*{nickname}" maxlength="20" placeholder="예: orbit_runner">
                </label>
                <label class="field">
                    <span>비밀번호</span>
                    <input type="password" th:field="*{password}" maxlength="100" placeholder="비밀번호 입력">
                </label>
                <p class="message-box" data-tone="info" th:if="${returnTo}">
                    로그인 후 원래 화면으로 돌아갑니다.
                </p>
                <p class="message-box" data-tone="error" th:if="${#fields.hasErrors('*')}" th:text="${#fields.errors('*')[0]}"></p>
                <p class="message-box" data-tone="error" th:if="${authErrorMessage}" th:text="${authErrorMessage}"></p>
                <div class="page-actions">
                    <button class="primary-button" type="submit">로그인</button>
                    <a class="secondary-button" th:href="@{/signup}">계정 만들기</a>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
