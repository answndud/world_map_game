<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인구 비교 배틀 플레이</title>
    <link rel="stylesheet" th:href="@{/css/site.css(v='20260330-a11y-keyboard-2')}">
    <script th:src="@{/js/game-over-modal.js(v='20260331-game-over-modal-helper-1')}" defer></script>
    <script th:src="@{/js/population-battle-game.js(v='20260406-public-copy-pass-1')}" defer></script>
</head>
<body data-page="population-battle-play" th:attr="data-session-id=${sessionId}">
<div class="page-shell">
    <th:block th:replace="~{fragments/site-header :: siteHeader('population-battle')}"></th:block>
    <header class="hero compact-hero">
        <h1>인구가 더 많은 나라를 고르세요</h1>
    </header>

    <main class="layout">
        <section class="panel game-panel">
            <div id="population-battle-game-status" class="stats-grid"></div>
            <article class="question-card">
                <p class="subtitle">현재 미션</p>
                <h2>Population Battle</h2>
                <p id="population-battle-stage-copy" class="hint">좌우 보기 두 개를 불러오는 중입니다.</p>
            </article>

            <div class="selection-row">
                <article class="selection-pill">
                    <span class="subtitle">선택 상태</span>
                    <strong id="population-battle-selection-label">좌우 보기 중 하나를 고르면 여기서 확인합니다.</strong>
                </article>
                <article class="selection-pill">
                    <span class="subtitle">진행 가이드</span>
                    <strong id="population-battle-stage-hint">두 나라 중 인구가 더 많다고 생각하는 나라를 고른 뒤 제출하세요.</strong>
                </article>
            </div>

            <form id="population-battle-answer-form" class="game-form">
                <div id="population-battle-options" class="options-grid"></div>
                <div class="action-buttons">
                    <button id="population-battle-submit-button" class="primary-button" type="submit" disabled>선택 제출</button>
                </div>
            </form>

            <div id="population-battle-answer-feedback" class="feedback-card" hidden></div>
            <div id="population-battle-stage-overlay" class="stage-overlay" hidden></div>
            <p id="population-battle-play-message" class="message-box" data-tone="info" hidden></p>
        </section>
    </main>
</div>
<div id="population-battle-game-over-modal" class="game-over-modal" hidden>
    <div class="game-over-modal__backdrop"></div>
    <section class="game-over-modal__panel"
             role="dialog"
             aria-modal="true"
             aria-labelledby="population-battle-game-over-title"
             aria-describedby="population-battle-game-over-summary"
             tabindex="-1">
        <h2 id="population-battle-game-over-title">탈락했습니다</h2>
        <p id="population-battle-game-over-summary" class="hero-copy">하트를 모두 잃었습니다.</p>
        <div class="modal-actions">
            <a class="secondary-button" href="/">홈으로</a>
            <button id="population-battle-restart-button" class="primary-button" type="button">다시 시작하기</button>
        </div>
    </section>
</div>
</body>
</html>
