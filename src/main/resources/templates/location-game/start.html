<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>국가 위치 찾기 시작</title>
    <link rel="stylesheet" th:href="@{/css/site.css(v='20260330-a11y-keyboard-2')}">
    <script th:src="@{/js/location-game.js(v='20260406-location-globe-fix-1')}" defer></script>
</head>
<body data-page="location-start">
<div class="page-shell">
    <th:block th:replace="~{fragments/site-header :: siteHeader('location')}"></th:block>
    <header class="hero compact-hero">
        <h1>국가 위치 찾기</h1>
    </header>

    <main class="layout">
        <section class="panel game-panel">
            <div class="panel-head">
                <h2>게임 시작</h2>
                <p th:if="${authenticatedNickname != null}">
                    현재는
                    <strong th:text="${authenticatedNickname}">player</strong>
                    이름으로 기록됩니다.
                </p>
                <p th:unless="${authenticatedNickname != null}">닉네임은 비워 두어도 됩니다.</p>
            </div>

            <form id="location-start-form" class="game-form">
                <label class="field">
                    <span>닉네임</span>
                    <input id="nickname" type="text" maxlength="20" placeholder="예: backend_learner">
                </label>
                <button id="location-start-submit" class="primary-button" type="submit">게임 시작하기</button>
            </form>

            <div class="rule-grid">
                <article class="rule-card">
                    <span class="subtitle">하트</span>
                    <strong>3개</strong>
                </article>
                <article class="rule-card">
                    <span class="subtitle">진행</span>
                    <strong>끝까지 이어서</strong>
                </article>
                <article class="rule-card">
                    <span class="subtitle">문제</span>
                    <strong>상위 72개 주요 국가</strong>
                </article>
                <article class="rule-card">
                    <span class="subtitle">입력</span>
                    <strong>국가 클릭 후 제출</strong>
                </article>
            </div>
            <p id="location-start-message" class="message-box" data-tone="info" hidden></p>
        </section>
    </main>
</div>
</body>
</html>
