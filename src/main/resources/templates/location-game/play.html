<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>국가 위치 찾기 플레이</title>
    <link rel="stylesheet" th:href="@{/css/site.css(v='20260404-location-run-recap-1')}">
    <script th:src="@{/vendor/globe.gl.min.js}" defer></script>
    <script th:src="@{/js/game-over-modal.js(v='20260331-game-over-modal-helper-1')}" defer></script>
    <script th:src="@{/js/location-game.js(v='20260406-public-copy-pass-1')}" defer></script>
</head>
<body data-page="location-play" th:attr="data-session-id=${sessionId}">
<div class="page-shell">
    <th:block th:replace="~{fragments/site-header :: siteHeader('location')}"></th:block>
    <header class="hero compact-hero">
        <h1>지구본에서 나라를 찾으세요</h1>
    </header>

    <main class="layout">
        <section class="panel game-panel">
            <div id="location-game-status" class="stats-grid"></div>
            <article class="question-card">
                <p class="subtitle">현재 미션</p>
                <h2 id="target-country-name">문제를 불러오는 중...</h2>
                <p id="location-stage-hint" class="hint">국가를 선택한 뒤 제출하세요.</p>
            </article>

            <form id="location-answer-form" class="game-form">
                <div class="globe-shell arcade-globe-shell">
                    <div class="globe-playfield">
                        <div id="globe-stage" class="globe-stage" tabindex="-1" aria-label="지구본 플레이 영역"></div>
                        <div id="location-stage-overlay" class="stage-overlay" hidden></div>
                    </div>
                </div>
                <div class="action-buttons location-submit-row">
                    <button id="location-submit-button" class="primary-button" type="submit" disabled>선택한 국가 제출</button>
                </div>
            </form>

            <div id="location-answer-feedback" class="feedback-card" hidden></div>
            <p id="location-play-message" class="message-box" data-tone="info">세션과 지구본을 준비하는 중입니다. 첫 진입에서는 잠시 걸릴 수 있습니다.</p>
        </section>
    </main>
</div>
<div id="location-game-over-modal" class="game-over-modal" hidden>
    <div class="game-over-modal__backdrop"></div>
    <section class="game-over-modal__panel"
             role="dialog"
             aria-modal="true"
             aria-labelledby="location-game-over-title"
             aria-describedby="location-game-over-summary"
             tabindex="-1">
        <h2 id="location-game-over-title">탈락했습니다</h2>
        <p id="location-game-over-summary" class="hero-copy">하트를 모두 잃었습니다.</p>
        <div id="location-game-over-recap" class="modal-recap-grid" aria-label="러닝 요약"></div>
        <div class="modal-actions">
            <a class="secondary-button" href="/">홈으로</a>
            <button id="location-restart-button" class="primary-button" type="button">다시 시작하기</button>
        </div>
    </section>
</div>
</body>
</html>
