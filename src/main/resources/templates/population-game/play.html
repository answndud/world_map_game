<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인구수 퀴즈 플레이</title>
    <link rel="stylesheet" th:href="@{/css/site.css(v='20260404-population-mobile-hud-1')}">
    <script th:src="@{/js/game-over-modal.js(v='20260331-game-over-modal-helper-1')}" defer></script>
    <script th:src="@{/js/population-game.js(v='20260406-public-copy-pass-1')}" defer></script>
</head>
<body data-page="population-play" th:attr="data-session-id=${sessionId}">
<div class="page-shell">
    <th:block th:replace="~{fragments/site-header :: siteHeader('population')}"></th:block>
    <header class="hero compact-hero">
        <h1>가까운 인구 구간을 고르세요</h1>
    </header>

    <main class="layout">
        <section class="panel game-panel">
            <div id="population-game-status" class="stats-grid stats-grid--compact-hud"></div>
            <article class="question-card">
                <p class="subtitle">현재 미션</p>
                <h2 id="population-target-country-name">문제를 불러오는 중...</h2>
                <p id="population-year" class="hint">기준 연도를 불러오는 중입니다.</p>
            </article>

            <div class="selection-row">
                <article class="selection-pill">
                    <span class="subtitle">선택</span>
                    <strong id="population-selection-label">선택 없음</strong>
                </article>
                <article class="selection-pill">
                    <span class="subtitle">가이드</span>
                    <strong id="population-stage-hint">가까운 구간을 고른 뒤 제출하세요.</strong>
                </article>
            </div>

            <form id="population-answer-form" class="game-form">
                <div id="population-options" class="options-grid"></div>
                <div class="action-buttons">
                    <button id="population-submit-button" class="primary-button" type="submit" disabled>선택 제출</button>
                </div>
            </form>

            <div id="population-answer-feedback" class="feedback-card" hidden></div>
            <div id="population-stage-overlay" class="stage-overlay" hidden></div>
            <p id="population-play-message" class="message-box" data-tone="info" hidden></p>
        </section>
    </main>
</div>
<div id="population-game-over-modal" class="game-over-modal" hidden>
    <div class="game-over-modal__backdrop"></div>
    <section class="game-over-modal__panel"
             role="dialog"
             aria-modal="true"
             aria-labelledby="population-game-over-title"
             aria-describedby="population-game-over-summary"
             tabindex="-1">
        <h2 id="population-game-over-title">탈락했습니다</h2>
        <p id="population-game-over-summary" class="hero-copy">하트를 모두 잃었습니다.</p>
        <div id="population-game-over-recap" class="modal-recap-grid" aria-label="러닝 요약"></div>
        <div class="modal-actions">
            <a class="secondary-button" href="/">홈으로</a>
            <button id="population-restart-button" class="primary-button" type="button">다시 시작하기</button>
        </div>
    </section>
</div>
</body>
</html>
