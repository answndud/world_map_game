<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>국가 인구수 맞추기 시작</title>
    <link rel="stylesheet" th:href="@{/css/site.css(v='20260324-square-ui-1')}">
    <script th:src="@{/js/population-game.js}" defer></script>
</head>
<body data-page="population-start">
<div class="page-shell">
    <th:block th:replace="~{fragments/site-header :: siteHeader('population')}"></th:block>
    <header class="hero compact-hero">
        <p class="eyebrow">Population Scan Level 1</p>
        <h1>국가 인구수 맞추기</h1>
        <p class="hero-copy">
            서버가 Stage, 하트, 인구 규모 구간 4개, 점수 계산을 모두 관리하는 아케이드형 인구수 게임입니다.
        </p>
    </header>

    <main class="layout">
        <section class="panel game-panel">
            <div class="panel-head">
                <h2>게임 시작</h2>
                <p>틀리면 같은 Stage를 다시 시도하고, 하트 3개를 모두 잃으면 같은 세션을 Stage 1부터 다시 시작할 수 있습니다.</p>
            </div>

            <form id="population-start-form" class="game-form">
                <label class="field">
                    <span>닉네임</span>
                    <input id="population-nickname" type="text" maxlength="20" placeholder="예: data_quizzer">
                </label>
                <button id="population-start-submit" class="primary-button" type="submit">게임 시작하기</button>
            </form>

            <div class="rule-grid">
                <article class="rule-card">
                    <span class="subtitle">Lives</span>
                    <strong>♥ 3</strong>
                </article>
                <article class="rule-card">
                    <span class="subtitle">Format</span>
                    <strong>Scale Bands</strong>
                </article>
                <article class="rule-card">
                    <span class="subtitle">Server</span>
                    <strong>Stage + Retry</strong>
                </article>
            </div>
            <p id="population-start-message" class="message-box" hidden></p>
        </section>
    </main>
</div>
</body>
</html>
