<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>어울리는 나라 추천 설문</title>
    <link rel="stylesheet" th:href="@{/css/site.css(v='20260324-square-ui-1')}">
</head>
<body>
<div class="page-shell">
    <th:block th:replace="~{fragments/site-header :: siteHeader('recommendation')}"></th:block>
    <header class="hero compact-hero">
        <p class="eyebrow">Find Your Match</p>
        <h1>어울리는 나라 추천</h1>
        <p class="hero-copy">
            생활 방식과 취향을 고르면
            지금 나와 잘 맞는 나라 3곳을 바로 골라드립니다.
        </p>
    </header>

    <main class="layout">
        <section class="panel game-panel">
            <div class="panel-head">
                <h2>설문 시작</h2>
                <p>기후, 생활 속도, 물가, 도시/자연 취향, 영어 환경, 우선 기준, 정착 성향, 이동 방식까지 8개 질문에 답하면 결과를 바로 확인할 수 있습니다.</p>
            </div>

            <div class="rule-grid">
                <article class="rule-card">
                    <span class="subtitle">Question</span>
                    <strong>8 Questions</strong>
                </article>
                <article class="rule-card">
                    <span class="subtitle">Result</span>
                    <strong>Top 3 Match</strong>
                </article>
                <article class="rule-card">
                    <span class="subtitle">Time</span>
                    <strong>Quick Result</strong>
                </article>
            </div>

            <p class="message-box" th:if="${surveyErrorMessage != null}" th:text="${surveyErrorMessage}">
                모든 문항을 선택해주세요.
            </p>

            <form class="game-form" th:action="@{/recommendation/survey}" method="post">
                <section class="panel recommendation-question"
                         th:each="question : ${surveyQuestions}">
                    <div class="panel-head">
                        <h2 th:text="${question.title}">어떤 기후가 더 오래 머물기 편한가요?</h2>
                        <p th:text="${question.helperText}">기후는 추천 풀이 크게 달라지는 기준입니다.</p>
                    </div>

                    <div class="options-grid">
                        <label class="option-card recommendation-option"
                               th:each="option : ${question.options}">
                            <input type="radio"
                                   th:name="${question.fieldName}"
                                   th:value="${option.value}"
                                   th:checked="${surveyForm.isSelected(question.fieldName, option.value)}">
                            <span class="option-card__copy">
                                <strong th:text="${option.label}">따뜻한 기후</strong>
                                <span th:text="${option.description}">햇빛과 온난한 날씨를 선호합니다.</span>
                            </span>
                        </label>
                    </div>
                </section>

                <div class="page-actions">
                    <button class="primary-button" type="submit">추천 결과 보기</button>
                    <a class="ghost-link" th:href="@{/}">메인으로 돌아가기</a>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
