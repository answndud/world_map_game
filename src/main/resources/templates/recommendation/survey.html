<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나에게 어울리는 국가 찾기 설문</title>
    <link rel="stylesheet" th:href="@{/css/site.css(v='20260330-a11y-keyboard-2')}">
</head>
<body>
<div class="page-shell">
    <th:block th:replace="~{fragments/site-header :: siteHeader('recommendation')}"></th:block>
    <header class="hero compact-hero">
        <h1>나에게 어울리는 국가 찾기</h1>
        <p class="hero-copy">20개 질문에 답하면 추천을 볼 수 있습니다.</p>
    </header>

    <main class="layout">
        <section class="panel game-panel">
            <div class="panel-head">
                <h2>설문 시작</h2>
            </div>

            <div class="rule-grid">
                <article class="rule-card">
                    <span class="subtitle">질문</span>
                    <strong th:text="${surveyQuestions.size() + '개'}">20개</strong>
                </article>
                <article class="rule-card">
                    <span class="subtitle">결과</span>
                    <strong>추천 3곳</strong>
                </article>
                <article class="rule-card">
                    <span class="subtitle">기준</span>
                    <strong>생활 조건</strong>
                </article>
            </div>

            <p class="message-box" data-tone="error" th:if="${surveyErrorMessage != null}" th:text="${surveyErrorMessage}">
                모든 문항을 선택해주세요.
            </p>

            <form class="game-form" th:action="@{/recommendation/survey}" method="post">
                <section class="panel recommendation-question"
                         th:each="question : ${surveyQuestions}">
                    <div class="panel-head">
                        <h2 th:text="${question.title}">어떤 기후가 더 오래 머물기 편한가요?</h2>
                        <p th:text="${question.helperText}">좋아하는 조건뿐 아니라 감수할 수 있는 조건까지 함께 생각해보면 더 잘 맞는 결과가 나옵니다.</p>
                    </div>

                    <div class="options-grid">
                        <label class="option-card recommendation-option"
                               th:each="option : ${question.options}">
                            <input type="radio"
                                   th:name="${question.fieldName}"
                                   th:value="${option.value}"
                                   th:checked="${surveyForm.isSelected(question.fieldName, option.value)}">
                            <span class="option-card__copy">
                                <strong th:text="${option.label}">따뜻한 기후</strong>
                                <span th:text="${option.description}">햇빛과 온난한 날씨를 선호합니다.</span>
                            </span>
                        </label>
                    </div>
                </section>

                <div class="page-actions">
                    <button class="primary-button" type="submit">추천 결과 보기</button>
                    <a class="ghost-link" th:href="@{/}">메인으로 돌아가기</a>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
