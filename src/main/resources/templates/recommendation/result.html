<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나에게 어울리는 국가 찾기 결과</title>
    <link rel="stylesheet" th:href="@{/css/site.css(v='20260330-a11y-keyboard-2')}">
    <script th:src="@{/js/recommendation-feedback.js(v='20260330-a11y-keyboard-2')}" defer></script>
</head>
<body>
<div class="page-shell">
    <th:block th:replace="~{fragments/site-header :: siteHeader('recommendation')}"></th:block>
    <header class="hero compact-hero">
        <h1>추천 결과</h1>
        <p class="hero-copy">
            <span th:text="${result.submittedPreferences.size()} + '개 답변 기준'">20개 답변 기준</span>
            추천입니다.
        </p>
    </header>

    <main class="layout">
        <section class="panel game-panel">
            <div class="panel-head">
                <h2>내가 고른 취향</h2>
            </div>

            <div class="stats-grid">
                <article class="stat-card" th:each="preference : ${result.submittedPreferences}">
                    <span class="subtitle" th:text="${preference.title}">기후</span>
                    <strong th:text="${preference.selectedLabel}">따뜻한 기후</strong>
                </article>
            </div>
        </section>

        <section class="panel game-panel">
            <div class="panel-head">
                <h2>잘 맞는 나라 3곳</h2>
            </div>

            <div class="card-grid">
                <article class="mode-card recommendation-country-card"
                         th:each="candidate : ${result.recommendations}">
                    <div class="card-top">
                        <span class="status" th:text="${'TOP ' + candidate.rank}">TOP 1</span>
                        <span class="subtitle" th:text="${candidate.iso3Code + ' · ' + candidate.continentLabel}">SGP · 아시아</span>
                    </div>
                    <h3 th:text="${candidate.countryNameKr}">싱가포르</h3>
                    <p th:text="${candidate.headline}">
                        도심 속도, 영어 친화도, 안전성이 모두 높은 국가입니다.
                    </p>
                    <div class="recommendation-meta">
                        <p th:text="${'수도 · ' + candidate.capitalCity}">수도 · 싱가포르</p>
                        <p th:text="${'인구 · ' + candidate.populationLabel}">인구 · 5,900,000명</p>
                        <p th:text="${'잘 맞는 정도 · ' + candidate.matchScore}">잘 맞는 정도 · 182</p>
                    </div>
                    <ul class="check-list recommendation-reason-list">
                        <li th:each="reason : ${candidate.reasons}" th:text="${reason}">
                            영어 친화도가 초반 적응 장벽을 낮춰 줄 가능성이 큽니다.
                        </li>
                    </ul>
                </article>
            </div>

            <div class="page-actions">
                <a class="primary-link" th:href="@{/recommendation/survey}">설문 다시 하기</a>
                <a class="ghost-link" th:href="@{/}">메인으로 돌아가기</a>
            </div>
        </section>

        <section class="panel game-panel">
            <div class="panel-head">
                <h2>추천 만족도</h2>
            </div>

            <form id="recommendation-feedback-form" class="game-form">
                <input type="hidden" name="feedbackToken" th:value="${feedbackToken}">
                <fieldset class="rating-fieldset">
                    <legend class="sr-only">추천 만족도 선택</legend>
                    <div class="rating-button-row">
                        <label class="rating-score-option">
                            <input class="rating-score-input" type="radio" name="satisfactionScore" value="1">
                            <span>1점</span>
                        </label>
                        <label class="rating-score-option">
                            <input class="rating-score-input" type="radio" name="satisfactionScore" value="2">
                            <span>2점</span>
                        </label>
                        <label class="rating-score-option">
                            <input class="rating-score-input" type="radio" name="satisfactionScore" value="3">
                            <span>3점</span>
                        </label>
                        <label class="rating-score-option">
                            <input class="rating-score-input" type="radio" name="satisfactionScore" value="4">
                            <span>4점</span>
                        </label>
                        <label class="rating-score-option">
                            <input class="rating-score-input" type="radio" name="satisfactionScore" value="5">
                            <span>5점</span>
                        </label>
                    </div>
                </fieldset>

                <div class="page-actions">
                    <button id="recommendation-feedback-submit" class="primary-button" type="submit" disabled>만족도 보내기</button>
                </div>
            </form>

            <div id="recommendation-feedback-message" class="feedback-inline-message" role="status" aria-live="polite" aria-atomic="true" hidden></div>
        </section>
    </main>
</div>
</body>
</html>
