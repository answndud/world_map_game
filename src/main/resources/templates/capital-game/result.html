<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수도 퀴즈 결과</title>
    <link rel="stylesheet" th:href="@{/css/site.css(v='20260330-a11y-keyboard-2')}">
</head>
<body>
<div class="page-shell">
    <th:block th:replace="~{fragments/site-header :: siteHeader('capital')}"></th:block>
    <header class="hero compact-hero">
        <h1>게임 결과</h1>
    </header>

    <main class="layout">
        <section class="panel game-panel">
            <article class="result-banner" th:classappend="${result.status.name() == 'GAME_OVER'} ? ' danger' : ' success'">
                <p class="subtitle">결과</p>
                <h2 th:text="${result.status.name() == 'GAME_OVER' ? '게임 종료' : '현재 기록'}">게임 종료</h2>
                <p th:text="${result.status.name() == 'GAME_OVER' ? '마지막 문제에서 종료되었습니다.' : '여기까지의 플레이 기록입니다.'}">
                    마지막 Stage에서 하트를 모두 잃었습니다.
                </p>
            </article>
            <div class="stats-grid">
                <article class="stat-card">
                    <span class="subtitle">플레이어</span>
                    <strong th:text="${result.playerNickname}">Guest</strong>
                </article>
                <article class="stat-card">
                    <span class="subtitle">상태</span>
                    <strong th:text="${result.status}">FINISHED</strong>
                </article>
                <article class="stat-card">
                    <span class="subtitle">총 점수</span>
                    <strong th:text="${result.totalScore}">500</strong>
                </article>
                <article class="stat-card">
                    <span class="subtitle">클리어 Stage</span>
                    <strong th:text="${result.clearedStageCount}">5</strong>
                </article>
                <article class="stat-card">
                    <span class="subtitle">총 시도 수</span>
                    <strong th:text="${result.totalAttemptCount}">8</strong>
                </article>
                <article class="stat-card">
                    <span class="subtitle">1트 클리어</span>
                    <strong th:text="${result.firstTryClearCount}">4</strong>
                </article>
                <article class="stat-card">
                    <span class="subtitle">도달 Stage</span>
                    <strong th:text="${result.currentStageNumber}">6</strong>
                </article>
                <article class="stat-card">
                    <span class="subtitle">남은 하트</span>
                    <strong th:text="${result.livesRemaining}">0</strong>
                </article>
            </div>

            <div class="panel-head">
                <h2>Stage별 기록</h2>
            </div>

            <div class="table-shell">
                <table class="result-table">
                    <thead>
                    <tr>
                        <th>Stage</th>
                        <th>국가</th>
                        <th>상태</th>
                        <th>시도 기록</th>
                        <th>점수</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="stage : ${result.stages}">
                        <td th:text="${stage.stageNumber}">1</td>
                        <td th:text="${stage.targetCountryName}">대한민국</td>
                        <td th:text="${stage.status}">CLEARED</td>
                        <td>
                            <div class="attempt-log" th:if="${!#lists.isEmpty(stage.attempts)}">
                                <p th:each="attempt : ${stage.attempts}"
                                   th:text="${attempt.correct ? attempt.attemptNumber + '차 정답 / 점수 +' + stage.awardedScore + ' / 하트 ' + attempt.livesRemainingAfter : attempt.attemptNumber + '차 오답 / 하트 ' + attempt.livesRemainingAfter}">
                                    1차 오답 / 하트 2
                                </p>
                            </div>
                            <span th:if="${#lists.isEmpty(stage.attempts)}">-</span>
                        </td>
                        <td th:text="${stage.awardedScore != null ? stage.awardedScore : '-'}">100</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="page-actions">
                <a class="primary-link" th:href="@{/games/capital/start}">다시 플레이</a>
                <a class="ghost-link" th:href="@{/}">메인으로 돌아가기</a>
            </div>
        </section>
    </main>
</div>
</body>
</html>
