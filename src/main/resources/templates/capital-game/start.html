<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수도 맞히기 시작</title>
    <link rel="stylesheet" th:href="@{/css/site.css(v='20260325-light-depth-10')}">
    <script th:src="@{/js/capital-game.js(v='20260327-capital-1')}" defer></script>
</head>
<body data-page="capital-start">
<div class="page-shell">
    <th:block th:replace="~{fragments/site-header :: siteHeader('capital')}"></th:block>
    <header class="hero compact-hero">
        <p class="eyebrow">Capital Scan</p>
        <h1>수도 맞히기</h1>
        <p class="hero-copy">
            국가 이름을 보고 4개의 수도 보기 중 정답을 고르는 퀴즈 모드입니다.
            Stage 생성, 정답 판정, 점수 계산, 하트 관리는 모두 서버가 담당합니다.
        </p>
    </header>

    <main class="layout">
        <section class="panel game-panel">
            <div class="panel-head">
                <h2>게임 시작</h2>
                <p th:if="${authenticatedNickname != null}">
                    현재 로그인 상태에서는
                    <strong th:text="${authenticatedNickname}">player</strong>
                    닉네임으로 기록됩니다. 아래 입력값은 비회원 플레이에서만 사용됩니다.
                </p>
                <p th:unless="${authenticatedNickname != null}">
                    틀리면 같은 Stage를 다시 시도하고, 하트 3개를 모두 잃으면 같은 세션을 Stage 1부터 다시 시작할 수 있습니다.
                </p>
            </div>

            <form id="capital-start-form" class="game-form">
                <label class="field">
                    <span>닉네임</span>
                    <input id="capital-nickname" type="text" maxlength="20" placeholder="예: capital_hunter">
                </label>
                <button id="capital-start-submit" class="primary-button" type="submit">게임 시작하기</button>
            </form>

            <div class="rule-grid">
                <article class="rule-card">
                    <span class="subtitle">Lives</span>
                    <strong>♥ 3</strong>
                </article>
                <article class="rule-card">
                    <span class="subtitle">Format</span>
                    <strong>4개 수도 보기</strong>
                </article>
                <article class="rule-card">
                    <span class="subtitle">Server</span>
                    <strong>Stage + Retry</strong>
                </article>
            </div>
            <p id="capital-start-message" class="message-box" data-tone="info" hidden></p>
        </section>
    </main>
</div>
</body>
</html>
