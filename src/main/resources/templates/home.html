<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldMap</title>
    <link rel="stylesheet" th:href="@{/css/site.css(v='20260402-human-pass-1')}">
</head>
<body>
<div class="page-shell">
    <th:block th:replace="~{fragments/site-header :: siteHeader('home')}"></th:block>
    <header class="hero home-hero">
        <div class="home-hero-copy">
            <h1>바로 플레이할 게임</h1>
            <div class="home-hero-support">
                <a class="ghost-link hero-support-link" th:href="@{/stats}">오늘 기록 보기</a>
                <div class="hero-account-callout"
                     th:if="${currentMember == null}">
                    <p class="hero-account-copy">
                        기록을 남기려면 로그인하세요.
                    </p>
                    <div class="page-actions">
                        <a class="secondary-button" th:href="@{/login}">로그인</a>
                        <a class="ghost-link" th:href="@{/signup}">회원가입</a>
                    </div>
                </div>

                <div class="hero-account-callout"
                     th:if="${currentMember != null}">
                    <p class="hero-account-copy">
                        <span class="account-chip" th:text="${currentMember.nickname}">orbit_runner</span>
                        현재 브라우저 기록이 연결되어 있습니다.
                    </p>
                    <div class="page-actions">
                        <a class="secondary-button" th:href="@{/mypage}">내 기록</a>
                        <form class="inline-form" th:action="@{/logout}" method="post">
                            <button class="ghost-link" type="submit">로그아웃</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="layout home-layout">
        <section class="panel home-mode-panel" id="home-modes">
            <div class="panel-head">
                <h2>게임 선택</h2>
            </div>
            <div class="panel-head home-subhead">
                <h3>오래 버티는 게임</h3>
            </div>
            <div class="card-grid home-mode-grid">
                <article class="mode-card" th:each="card : ${modeCards}" th:if="${card.group == 'arcade'}">
                    <div class="card-top">
                        <span class="status" th:text="${card.status}">Planned</span>
                    </div>
                    <h3 th:text="${card.title}">국가 위치 찾기</h3>
                    <p th:text="${card.description}">
                        원하는 게임을 골라 바로 플레이를 시작할 수 있습니다.
                    </p>
                    <a class="ghost-link home-mode-link" th:href="${card.href}">시작하기</a>
                </article>
            </div>

            <div class="panel-head home-subhead">
                <h3>짧게 푸는 게임과 추천</h3>
            </div>
            <div class="card-grid home-mode-grid">
                <article class="mode-card" th:each="card : ${modeCards}" th:if="${card.group != 'arcade'}">
                    <div class="card-top">
                        <span class="status" th:text="${card.status}">Planned</span>
                    </div>
                    <h3 th:text="${card.title}">수도 퀴즈</h3>
                    <p th:text="${card.description}">
                        원하는 게임을 골라 바로 플레이를 시작할 수 있습니다.
                    </p>
                    <a class="ghost-link home-mode-link" th:href="${card.href}">시작하기</a>
                </article>
            </div>
        </section>
    </main>
</div>
</body>
</html>
