<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>국기 퀴즈 시작</title>
    <link rel="stylesheet" th:href="@{/css/site.css(v='20260330-a11y-keyboard-2')}">
    <script th:src="@{/js/flag-game.js(v='20260406-public-copy-pass-1')}" defer></script>
</head>
<body data-page="flag-start">
<div class="page-shell">
    <th:block th:replace="~{fragments/site-header :: siteHeader('flag')}"></th:block>
    <header class="hero compact-hero">
        <h1>국기 퀴즈</h1>
    </header>

    <main class="layout">
        <section class="panel game-panel">
            <div class="panel-head">
                <h2>게임 시작</h2>
                <p th:if="${authenticatedNickname != null}">
                    현재는
                    <strong th:text="${authenticatedNickname}">player</strong>
                    이름으로 기록됩니다.
                </p>
                <p th:unless="${authenticatedNickname != null}">닉네임은 비워 두어도 됩니다.</p>
            </div>

            <form id="flag-start-form" class="game-form">
                <label class="field">
                    <span>닉네임</span>
                    <input id="flag-nickname" type="text" maxlength="20" placeholder="예: flag_runner">
                </label>
                <button id="flag-start-submit" class="primary-button" type="submit">게임 시작하기</button>
            </form>

            <div class="rule-grid">
                <article class="rule-card">
                    <span class="subtitle">하트</span>
                    <strong>♥ 3</strong>
                </article>
                <article class="rule-card">
                    <span class="subtitle">형식</span>
                    <strong>국기 + 4개 국가 보기</strong>
                </article>
                <article class="rule-card">
                    <span class="subtitle">문제</span>
                    <strong>현재 12개 국기</strong>
                </article>
            </div>
            <p id="flag-start-message" class="message-box" data-tone="info" hidden></p>
        </section>
    </main>
</div>
</body>
</html>
