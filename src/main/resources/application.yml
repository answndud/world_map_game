spring:
  application:
    name: worldmap
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
  data:
    redis:
      repositories:
        enabled: false
  jpa:
    open-in-view: false

server:
  error:
    whitelabel:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

worldmap:
  legacy:
    rollback:
      enabled: false
  seed:
    countries:
      enabled: true
      location: classpath:data/countries.json
  admin:
    bootstrap:
      enabled: ${WORLDMAP_ADMIN_BOOTSTRAP_ENABLED:false}
      nickname: ${WORLDMAP_ADMIN_BOOTSTRAP_NICKNAME:}
      password: ${WORLDMAP_ADMIN_BOOTSTRAP_PASSWORD:}
  ranking:
    key-prefix: leaderboard
