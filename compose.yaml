services:
  postgres:
    image: 'postgres:16-alpine'
    container_name: worldmap-postgres
    environment:
      POSTGRES_DB: worldmap
      POSTGRES_USER: worldmap
      POSTGRES_PASSWORD: worldmap
    ports:
      - '5432:5432'
    volumes:
      - worldmap-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worldmap -d worldmap"]
      interval: 10s
      timeout: 5s
      retries: 10
  redis:
    image: 'redis:7-alpine'
    container_name: worldmap-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - '6379:6379'
    volumes:
      - worldmap-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  worldmap-postgres-data:
  worldmap-redis-data:
